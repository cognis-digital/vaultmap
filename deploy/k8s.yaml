apiVersion: apps/v1
kind: Deployment
metadata: { name: vaultmap, labels: { app: vaultmap } }
spec:
  replicas: 1
  selector: { matchLabels: { app: vaultmap } }
  template:
    metadata: { labels: { app: vaultmap } }
    spec:
      containers:
        - name: vaultmap
          image: ghcr.io/cognis-digital/vaultmap:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: vaultmap }
spec:
  selector: { app: vaultmap }
  ports: [{ port: 80, targetPort: 8000 }]
